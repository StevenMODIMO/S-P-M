<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <title>Offline</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica,
          Arial, sans-serif;
        display: grid;
        place-items: center;
        min-height: 100vh;
        background: #111111;
        color: #ffffff;
      }
      .card {
        max-width: 480px;
        padding: 32px;
        border-radius: 16px;
        background: #1f1f1f;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        text-align: center;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 24px;
      }
      p {
        margin: 0 0 16px;
        line-height: 1.5;
      }
      button {
        border: 0;
        border-radius: 999px;
        padding: 10px 18px;
        font-weight: 600;
        background: #ffffff;
        color: #111111;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You are offline</h1>
      <p>
        Check your internet connection and try again. This app will continue to
        work with any cached pages.
      </p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
